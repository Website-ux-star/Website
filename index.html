<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ddd;
            margin-bottom: 20px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; text-align: center; }
        .links-container { width: 100%; max-width: 400px; }
        .link-card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: block;
            transition: transform 0.2s;
        }
        .link-card:hover { transform: translateY(-3px); background-color: #eee; }
    </style>
</head>
<body>

    <div class="profile-pic"></div> <h1>Welcome</h1>
    <p>Class 10th Student | Humanities Aspirant</p>

    <div class="links-container">
        <a href="#" class="link-card">My Study Notes</a>
        <a href="#" class="link-card">BHU CHS Preparation Tips</a>
        <a href="#" class="link-card">Contact Me</a>
    </div>

</body>
</html>
