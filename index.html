<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8 DAV Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #2c3e50; /* Dim Blue */
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #3498db;
        }

        .subject-button {
            background-color: #34495e;
            border: 2px solid #3498db;
            color: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        .subject-button:hover { background-color: #3498db; color: #2c3e50; }

        /* This hides the "Beta" message initially */
        #message-screen { display: none; }
        
        .funny-text {
            font-size: 1.8rem;
            color: #e74c3c; /* Red color for the 'scolding' */
            font-weight: bold;
            margin-bottom: 20px;
        }

        .back-btn {
            color: #3498db;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="container">
        <h1>Class 8 DAV</h1>
        <div class="subject-button" onclick="showMessage('Maths')">Maths</div>
        <div class="subject-button" onclick="showMessage('Science')">Science</div>
        <div class="subject-button" onclick="showMessage('Sst')">Sst</div>
    </div>

    <div id="message-screen" class="container">
        <div id="subject-title" style="color: #95a5a6; margin-bottom: 10px;"></div>
        <div class="funny-text">Class me kya kar rhe the Beta?</div>
        <div class="back-btn" onclick="goBack()">Go back to studies</div>
    </div>

    <script>
        function showMessage(subject) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('message-screen').style.display = 'block';
            document.getElementById('subject-title').innerText = "Entering " + subject + "...";
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('message-screen').style.display = 'none';
        }
    </script>

</body>
</html>
