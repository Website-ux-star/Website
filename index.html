<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8 DAV Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* Dim Blue Background */
            background-color: #2c3e50; 
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #3498db; /* Brighter blue for the title */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subject-button {
            background-color: #34495e; /* Slightly lighter dim blue */
            border: 2px solid #3498db;
            color: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .subject-button:hover {
            background-color: #3498db;
            color: #2c3e50;
            transform: translateY(-3px);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Class 8 DAV</h1>
        
        <a href="#" class="subject-button">Maths</a>
        <a href="#" class="subject-button">Science</a>
        <a href="#" class="subject-button">Sst</a>

        <div class="footer">
            Study Portal • 2026
        </div>
    </div>

</body>
</html>
