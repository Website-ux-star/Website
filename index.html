<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAV Class 8 Notes</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { width: 100%; max-width: 450px; display: none; }
        
        /* This makes Page 1 show up by default */
        #page1 { display: block; } 
        
        h1 { font-size: 2.2rem; margin-bottom: 30px; color: #3498db; }
        .funny-text { font-size: 1.8rem; color: #e74c3c; font-weight: bold; margin-bottom: 25px; }
        .question-text { font-size: 1.3rem; margin-bottom: 20px; color: #f1c40f; }

        .btn {
            background-color: #34495e;
            border: 2px solid #3498db;
            color: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            font-size: 1.1rem;
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .btn:hover { background-color: #3498db; color: #2c3e50; }
        
        .final-msg { font-size: 1.5rem; color: #f39c12; font-weight: bold; margin-top: 20px; padding: 10px; }
        .back-link { margin-top: 30px; color: #bdc3c7; cursor: pointer; text-decoration: underline; display: block; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="page1" class="container">
        <h1>DAV Class 8 Notes</h1>
        <div class="btn" onclick="goTo('page2')">Maths</div>
        <div class="btn" onclick="goTo('page2')">Science</div>
        <div class="btn" onclick="goTo('page2')">Sst</div>
    </div>

    <div id="page2" class="container">
        <div class="funny-text">Class me kya kar rhe the Beta?</div>
        <div class="btn" onclick="goTo('page3')">A. Absent the</div>
        <div class="btn" onclick="finish('Not my problem')">B. Likhe nahi hain</div>
        <span class="back-link" onclick="goTo('page1')">← Go Back</span>
    </div>

    <div id="page3" class="container">
        <div class="question-text">kyu absent the?</div>
        <div class="btn" onclick="finish('Not my problem, kuch accha bahana hota to sochte')">A. Bimaar the</div>
        <div class="btn" onclick="finish('Not my problem, kuch accha bahana hota to sochte')">B. Ghum rhe the</div>
        <div class="btn" onclick="finish('Not my problem, kuch accha bahana hota to sochte')">C. Shadi me gye the</div>
        <div class="btn" onclick="finish('Not my problem, kuch accha bahana hota to sochte')">D. School Jane ka man nhi tha</div>
        <span class="back-link" onclick="goTo('page2')">← Go Back</span>
    </div>

    <div id="page4" class="container">
        <div id="final-text" class="final-msg"></div>
        <span class="back-link" onclick="goTo('page1')">Back to Home</span>
    </div>

    <script>
        // Use a simpler navigation function
        function goTo(pageId) {
            // Hide all pages
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('page4').style.display = 'none';
            
            // Show only the selected page
            document.getElementById(pageId).style.display = 'block';
        }

        function finish(msg) {
            goTo('page4');
            document.getElementById('final-text').innerText = msg;
        }
    </script>

</body>
</html>
